<!doctype html>
<!-- A trimmed Gmail-shaped DOM: role=main, message rows with stable ids +
     aria-labels, a nav region (should be skipped), and a hidden row (should
     not be observed). Used by the real-Chrome skim smoke. -->
<html>
  <head><meta charset="utf-8" /><title>Inbox (3) - you@gmail.com</title></head>
  <body>
    <div role="navigation" aria-label="Main menu">
      <a href="https://mail.google.com/mail/u/0/#inbox">Inbox</a>
      <a href="https://mail.google.com/mail/u/0/#sent">Sent</a>
    </div>
    <div role="main">
      <h2 aria-level="1">Inbox</h2>
      <table>
        <tbody>
          <tr class="zA" data-legacy-message-id="msg-aaa111" aria-label="From Dana Reeve, subject Q3 board deck, 9:14 AM, unread">
            <td><span class="sender">Dana Reeve</span></td>
            <td><span class="subject">Q3 board deck</span> <span class="snippet">— here is the latest draft for review</span></td>
            <td><span class="time">9:14 AM</span></td>
          </tr>
          <tr class="zA" data-legacy-message-id="msg-bbb222" aria-label="From GitHub, subject [solpbc/vit] PR #42 review requested, 8:02 AM">
            <td><span class="sender">GitHub</span></td>
            <td><span class="subject">[solpbc/vit] PR #42 review requested</span> <span class="snippet">— jdoe requested your review</span></td>
            <td><span class="time">8:02 AM</span></td>
          </tr>
          <tr class="zA" data-legacy-message-id="msg-hidden" style="display:none" aria-label="From Spam, subject You won, 1:00 AM">
            <td><span class="sender">Spam Sender</span></td>
            <td><span class="subject">SECRET-HIDDEN-SUBJECT you won a prize</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
