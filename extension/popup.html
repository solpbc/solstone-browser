<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face { font-family: "Comfortaa"; src: url("fonts/comfortaa.woff2") format("woff2"); font-weight: 700; font-display: swap; }
      @font-face { font-family: "InterBody"; src: url("fonts/inter.woff2") format("woff2"); font-weight: 400 600; font-display: swap; }
      :root {
        --ground: #faf3e4;        /* surface.cream */
        --surface: #fefcf8;       /* surface.cream.bright */
        --ink: #1a1a1a;
        --soft: #5b5246;          /* warm secondary */
        --muted: #6e6453;         /* warm meta */
        --line: #ece3d0;          /* hairline */
        --line2: #e2d7bf;
        --orange: #e8923a;        /* decoration only */
        --orange-ink: #b06a1a;    /* accessible orange — text/links */
        --orange-wash: #fbefdd;
        --ok: #166534;            /* success-ink */
        --ok-wash: #e7f1e9;
        --bad: #9f2d2d;           /* danger */
        --bad-wash: #f8e9e6;
      }
      body {
        width: 300px;
        margin: 0;
        font: 13px/1.45 "InterBody", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--ground);
        color: var(--ink);
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 14px 9px;
      }
      header img { display: block; }
      header .word {
        font-family: "Comfortaa", system-ui, sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--ink);
        letter-spacing: -0.3px;
      }
      header .desc { color: var(--muted); font-size: 12px; }
      .body { padding: 0 14px 14px; }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 0;
        border-top: 1px solid var(--line);
      }
      .muted { color: var(--muted); }
      .pill {
        font-size: 12px;
        padding: 2px 9px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
      }
      .pill.ok { color: var(--ok); background: var(--ok-wash); border-color: transparent; }
      .pill.bad { color: var(--bad); background: var(--bad-wash); border-color: transparent; }
      button {
        font: inherit;
        border: 1px solid var(--line2);
        background: var(--surface);
        color: var(--ink);
        border-radius: 9px;
        padding: 9px 10px;
        cursor: pointer;
      }
      button.primary {
        background: var(--orange);
        border-color: var(--orange);
        color: #1a1a1a;
        font-weight: 600;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .actions { display: flex; gap: 8px; margin-top: 11px; }
      .actions button { flex: 1; }
      .sites { margin-top: 4px; font-size: 12px; }
      .sites .s { color: var(--soft); padding-top: 2px; }
      a { color: var(--orange-ink); text-decoration: none; }
      footer {
        padding: 9px 14px 12px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        border-top: 1px solid var(--line);
      }
      .err { color: var(--bad); font-size: 12px; margin-top: 6px; }
      .consequence {
        color: var(--bad);
        font-size: 12px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: space-between;
      }
      .consequence button { margin: 0; padding: 4px 10px; font-size: 12px; }
      .pinhint { font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
    </style>
  </head>
  <body>
    <header>
      <img src="brand/sol-ring.svg" width="20" height="20" alt="" />
      <span class="word">solstone</span>
      <span class="desc">browser</span>
    </header>
    <div class="body">
      <div class="row">
        <span>journal</span>
        <span id="journalState" class="pill">…</span>
      </div>
      <div class="row">
        <span>observing</span>
        <span id="pauseState" class="pill">…</span>
      </div>
      <div class="row" style="border-bottom: 1px solid var(--line)">
        <span>this page</span>
        <span id="pageState" class="muted">…</span>
      </div>
      <div class="sites" id="sites"></div>

      <div class="actions">
        <button id="addBtn" class="primary">observe this site</button>
        <button id="pauseBtn">pause all</button>
      </div>
      <div class="consequence" id="consequence" hidden>
        <span id="consequenceText"></span>
        <button id="tryBtn">try now</button>
      </div>
      <div class="err" id="err"></div>
      <div class="pinhint" id="pinHint" hidden>pin solstone to your toolbar so its status light stays visible.</div>
    </div>
    <footer>
      <span id="streamLabel">—</span>
      <a href="#" id="optsLink">settings ›</a>
    </footer>
    <script src="lib/hosts.js"></script>
    <script src="lib/escape.js"></script>
    <script src="lib/failures.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
